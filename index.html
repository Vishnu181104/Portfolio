<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Jaya Vishnu Portfolio</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #ffffff;
        color: #2a0712;
        font-family: Arial, sans-serif;
      }

      main {
        width: min(640px, calc(100% - 32px));
        padding: 32px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 24px;
        background: rgba(255, 247, 237, 0.9);
      }

      a {
        color: #f97316;
        font-weight: 700;
      }

      code {
        padding: 3px 6px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.08);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Jaya Vishnu Portfolio</h1>
      <p>This project is a Next.js app, so it will not run by opening this HTML file directly.</p>
      <p>Run <code>npm run dev</code>, then open <a href="http://localhost:3000">http://localhost:3000</a>.</p>
    </main>
  </body>
</html>
